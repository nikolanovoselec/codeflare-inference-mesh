name: Security
# REL004SecurityWorkflows

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
  schedule:
    - cron: '17 4 * * 1'

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  workflow-safety:
    name: Workflow safety baseline
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Reject dangerous workflow-run checkout pattern
        run: |
          node <<'NODE'
          const fs = require('fs')
          const path = require('path')
          const workflowDir = '.github/workflows'
          const workflowRun = 'workflow' + '_run'
          const headSha = `github.event.${workflowRun}.head_sha`
          const eventGuard = `github.event.${workflowRun}.event == 'push'`
          const repoGuard = `github.event.${workflowRun}.head_repository.full_name == github.repository`
          const checkoutRef = `${headSha} || github.ref`
          const files = fs.readdirSync(workflowDir).filter((name) => name.endsWith('.yml') || name.endsWith('.yaml'))
          const offenders = []
          for (const name of files) {
            const file = path.join(workflowDir, name)
            const text = fs.readFileSync(file, 'utf8')
            const usesWorkflowRun = text.includes(workflowRun)
            const usesHeadSha = text.includes(headSha)
            if (!usesWorkflowRun && !usesHeadSha) continue
            const hardenedDeploy = name === 'deploy.yml' &&
              text.includes(eventGuard) &&
              text.includes(repoGuard) &&
              text.includes(checkoutRef)
            if (!hardenedDeploy) offenders.push(file)
          }
          if (offenders.length > 0) {
            console.error(`::error::dangerous workflow event checkout pattern in ${offenders.join(', ')}`)
            process.exit(1)
          }
          NODE
      - name: Require pinned action and runner versions
        run: |
          floating_action='@''latest'
          floating_runner='ubuntu-''latest'
          if grep -R "$floating_action\|$floating_runner" .github/workflows; then
            echo "::error::unversioned action or runner pin found"
            exit 1
          fi
          if grep -RE "actions/(checkout|setup-node|setup-go|upload-artifact)@v[0-9]+([^0-9.]|$)" .github/workflows; then
            echo "::error::major-only action pin found"
            exit 1
          fi

  codeql:
    name: CodeQL
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    if: github.repository_visibility == 'public'
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript, go]
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: github/codeql-action/init@v4.36.2
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/analyze@v4.36.2

  scorecard:
    name: OpenSSF Scorecard
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    if: github.repository_visibility == 'public' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      security-events: write
      id-token: write
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: ossf/scorecard-action@v2.4.3
        with:
          results_file: scorecard.sarif
          results_format: sarif
          publish_results: false
      - uses: github/codeql-action/upload-sarif@v4.36.2
        with:
          sarif_file: scorecard.sarif

  security:
    name: security
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: [workflow-safety, codeql]
    if: always()
    steps:
      - name: Require security gates
        run: |
          test "${{ needs.workflow-safety.result }}" = "success"
          case "${{ needs.codeql.result }}" in success|skipped) exit 0 ;; *) exit 1 ;; esac
