name = "codeflare-inference-mesh-router"
main = "src/index.ts"
compatibility_date = "2026-06-01"
workers_dev = true

[vars]
MAX_REQUEST_BYTES = "16777216"
HEARTBEAT_TTL_SECONDS = "45"
AI_GATEWAY_ACCOUNT_ID = "set-by-deploy-or-runtime-secret"
AI_GATEWAY_ID = "inference-mesh"
AI_GATEWAY_ROUTE_NAME = "mesh-default"
AI_GATEWAY_PROVIDER_NAME = "codeflare-inference-mesh"
AI_GATEWAY_PUBLIC_MODEL = "mesh-default"
WORKER_NAME = "codeflare-inference-mesh-router"
WORKER_BASE_URL = "https://codeflare-inference-mesh-router.<your-subdomain>.workers.dev"
GITHUB_REPOSITORY = "nikolanovoselec/codeflare-inference-mesh"
AGENT_RELEASE_TAG = "agent-release-tag-placeholder"

[[d1_databases]]
binding = "DB"
database_name = "codeflare-inference-mesh"
database_id = "create-via-deploy-workflow"

[[durable_objects.bindings]]
name = "REGISTRY"
class_name = "RegistryDO"

# Workers VPC / Cloudflare Mesh binding (required for real deploys).
# Kept commented in source so CI dry-runs do not require an account with Workers VPC.
# The deploy workflow uncomments and verifies this block before `wrangler deploy`.
# [[vpc_networks]]
# binding = "MESH"
# network_id = "cf1:network"
# remote = true

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RegistryDO"]

[env.integration]
name = "codeflare-inference-mesh-router-integration"
workers_dev = true

[env.integration.vars]
MAX_REQUEST_BYTES = "16777216"
HEARTBEAT_TTL_SECONDS = "45"
AI_GATEWAY_ACCOUNT_ID = "set-by-deploy-or-runtime-secret"
AI_GATEWAY_ID = "inference-mesh-integration"
AI_GATEWAY_ROUTE_NAME = "mesh-default"
AI_GATEWAY_PROVIDER_NAME = "codeflare-inference-mesh-integration"
AI_GATEWAY_PUBLIC_MODEL = "mesh-default"
WORKER_NAME = "codeflare-inference-mesh-router-integration"
WORKER_BASE_URL = "https://codeflare-inference-mesh-router-integration.<your-subdomain>.workers.dev"
GITHUB_REPOSITORY = "nikolanovoselec/codeflare-inference-mesh"
AGENT_RELEASE_TAG = "agent-release-tag-placeholder"

[[env.integration.d1_databases]]
binding = "DB"
database_name = "codeflare-inference-mesh-integration"
database_id = "create-via-deploy-workflow"

[[env.integration.durable_objects.bindings]]
name = "REGISTRY"
class_name = "RegistryDO"

# Workers VPC / Cloudflare Mesh binding for integration deploys.
# The deploy workflow uncomments this block before `wrangler deploy --env integration`.
# [[env.integration.vpc_networks]]
# binding = "MESH"
# network_id = "cf1:network"
# remote = true

[[env.integration.migrations]]
tag = "v1"
new_sqlite_classes = ["RegistryDO"]
