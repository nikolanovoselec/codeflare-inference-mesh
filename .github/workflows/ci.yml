name: CI
# REL001PullRequestChecks
# REL003PackageSmoke

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  router:
    name: Router Worker checks
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'
      - name: Install dependencies
        run: npm install
      - name: Lint router
        run: npm run lint --workspace packages/router-worker
      - name: Test router behavior
        run: npm run test --workspace packages/router-worker
      - name: Type-check router
        run: npm run typecheck --workspace packages/router-worker
      - name: Generate Wrangler types
        run: npm run cf-types --workspace packages/router-worker
      - name: Worker dry-run deploy
        run: npm run dry-run --workspace packages/router-worker

  agent:
    name: Node agent checks
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: packages/node-agent
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-go@v6.5.0
        with:
          go-version: '1.26.4'
      - name: Go test
        run: go test ./...
      - name: Go vet
        run: go vet ./...
      - name: Go race tests
        run: go test -race ./...
      - name: Build command
        run: go build ./cmd/inference-mesh-agent

  packaging:
    name: Package smoke artifact
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: packages/node-agent
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-go@v6.5.0
        with:
          go-version: '1.26.4'
      - name: Build staged binary
        run: mkdir -p dist && GOOS=linux GOARCH=amd64 go build -ldflags "-X main.version=ci" -o dist/inference-mesh-agent-linux-amd64 ./cmd/inference-mesh-agent
      - name: Create archive and checksums
        run: |
          tar -C dist -czf dist/inference-mesh-agent-linux-amd64.tar.gz inference-mesh-agent-linux-amd64
          sha256sum dist/inference-mesh-agent-linux-amd64.tar.gz > dist/checksums.txt
          sha256sum -c dist/checksums.txt
      - name: Version command
        run: ./dist/inference-mesh-agent-linux-amd64 version
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: inference-mesh-agent-linux-amd64
          path: packages/node-agent/dist/*

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/dependency-review-action@v5.0.0

  vulnerability-checks:
    name: Vulnerability checks
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'
      - uses: actions/setup-go@v6.5.0
        with:
          go-version: '1.26.4'
      - name: npm audit
        run: npm install && npm audit --audit-level=high --omit=dev
      - name: Go vulnerability check
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.5.0
          cd packages/node-agent
          govulncheck ./...

  test:
    name: test
    runs-on: ubuntu-24.04
    needs: [router, agent, packaging, dependency-review, vulnerability-checks]
    if: always()
    steps:
      - name: Require required checks
        run: |
          test "${{ needs.router.result }}" = "success"
          test "${{ needs.agent.result }}" = "success"
          test "${{ needs.packaging.result }}" = "success"
          test "${{ needs.vulnerability-checks.result }}" = "success"
          case "${{ needs.dependency-review.result }}" in success|skipped) exit 0 ;; *) exit 1 ;; esac
