name: Security
# REL004SecurityWorkflows

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
  schedule:
    - cron: '17 4 * * 1'

permissions:
  contents: read

jobs:
  workflow-safety:
    name: Workflow safety baseline
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Validate workflow safety structurally
        run: node packages/router-worker/scripts/workflow-safety.mjs .github/workflows

  codeql:
    name: CodeQL
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    if: github.repository_visibility == 'public'
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript, go]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2

  scorecard:
    name: OpenSSF Scorecard
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    if: github.repository_visibility == 'public' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      security-events: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: scorecard.sarif
          results_format: sarif
          publish_results: false
      - uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: scorecard.sarif

  security:
    name: security
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: [workflow-safety, codeql]
    if: always()
    steps:
      - name: Require security gates
        run: |
          test "${{ needs.workflow-safety.result }}" = "success"
          case "${{ needs.codeql.result }}" in success|skipped) exit 0 ;; *) exit 1 ;; esac
