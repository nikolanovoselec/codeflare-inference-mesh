name: Security
# REL004SecurityWorkflows

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
  schedule:
    - cron: '17 4 * * 1'

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  workflow-safety:
    name: Workflow safety baseline
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Validate workflow safety structurally
        run: node packages/router-worker/scripts/workflow-safety.mjs .github/workflows

  codeql:
    name: CodeQL
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    if: github.repository_visibility == 'public'
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript, go]
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: github/codeql-action/init@v4.36.2
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/analyze@v4.36.2

  scorecard:
    name: OpenSSF Scorecard
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    if: github.repository_visibility == 'public' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      security-events: write
      id-token: write
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: ossf/scorecard-action@v2.4.3
        with:
          results_file: scorecard.sarif
          results_format: sarif
          publish_results: false
      - uses: github/codeql-action/upload-sarif@v4.36.2
        with:
          sarif_file: scorecard.sarif

  security:
    name: security
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: [workflow-safety, codeql]
    if: always()
    steps:
      - name: Require security gates
        run: |
          test "${{ needs.workflow-safety.result }}" = "success"
          case "${{ needs.codeql.result }}" in success|skipped) exit 0 ;; *) exit 1 ;; esac
