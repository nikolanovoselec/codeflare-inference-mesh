name: Fuzz
# REL004FuzzWorkflows

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
  schedule:
    - cron: '43 4 * * 1'

permissions:
  contents: read

jobs:
  router-fuzz:
    name: Router bounded fuzz
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
      - name: Install dependencies
        run: npm ci
      - name: Run router fuzz corpus
        run: npx vitest run src/fuzz.test.ts
        working-directory: packages/router-worker

  agent-fuzz:
    name: Agent bounded fuzz
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    defaults:
      run:
        working-directory: packages/node-agent
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.26.4'
          cache-dependency-path: packages/node-agent/go.mod
      - name: Run agent fuzz targets
        run: go test -run=^$ -fuzz=Fuzz -fuzztime=30s ./internal/agent

  fuzz:
    name: fuzz
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: [router-fuzz, agent-fuzz]
    if: always()
    steps:
      - name: Require fuzz gates
        run: |
          test "${{ needs.router-fuzz.result }}" = "success"
          test "${{ needs.agent-fuzz.result }}" = "success"
