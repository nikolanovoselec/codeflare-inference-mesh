name: Deploy
# REL002AutoProductionDeploy
# REL002ManualIntegrationDeploy
# REL003ReleaseArtifacts

on:
  workflow_run:
    workflows: ['PR Checks']
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        default: integration
        type: choice
        options: [production, integration]
      version_tag:
        description: Optional release tag. Production uses vX.Y.Z; integration uses vX.Y.Z-dev.N. Blank auto-generates one.
        required: false
      worker_base_url:
        description: Optional deployed Worker base URL. Blank uses environment/repository variables.
        required: false

concurrency:
  group: deploy-${{ github.event_name == 'workflow_run' && 'production' || inputs.environment }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: read

jobs:
  deploy:
    name: Deploy router and package agent
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run'
       && github.event.workflow_run.conclusion == 'success'
       && github.event.workflow_run.event == 'push'
       && github.event.workflow_run.head_repository.full_name == github.repository)
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    environment: ${{ github.event_name == 'workflow_run' && 'production' || (github.ref == 'refs/heads/main' && inputs.environment == 'production' && 'production' || 'integration') }}
    steps:
      - name: Guard deploy source
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_ENVIRONMENT: ${{ inputs.environment }}
          GITHUB_REF: ${{ github.ref }}
          WORKFLOW_RUN_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          WORKFLOW_RUN_EVENT: ${{ github.event.workflow_run.event }}
          WORKFLOW_RUN_REPOSITORY: ${{ github.event.workflow_run.head_repository.full_name }}
          EXPECTED_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$INPUT_ENVIRONMENT" = "production" ] && [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "::error::Production deploys are only allowed from main. Got ref: $GITHUB_REF"
            exit 1
          fi
          if [ "$EVENT_NAME" = "workflow_run" ]; then
            [ "$WORKFLOW_RUN_CONCLUSION" = "success" ] || { echo "::error::PR Checks did not succeed"; exit 1; }
            [ "$WORKFLOW_RUN_EVENT" = "push" ] || { echo "::error::Production deploys require a same-repository push"; exit 1; }
            [ "$WORKFLOW_RUN_REPOSITORY" = "$EXPECTED_REPOSITORY" ] || { echo "::error::Production deploys require the same repository"; exit 1; }
          fi

      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
          persist-credentials: false

      - name: Resolve deploy settings
        id: settings
        env:
          INPUT_ENVIRONMENT: ${{ inputs.environment }}
          INPUT_VERSION_TAG: ${{ inputs.version_tag }}
          INPUT_WORKER_BASE_URL: ${{ inputs.worker_base_url }}
          WORKFLOW_RUN_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          WORKER_BASE_URL: ${{ vars.WORKER_BASE_URL }}
          PRODUCTION_WORKER_BASE_URL: ${{ vars.PRODUCTION_WORKER_BASE_URL }}
          INTEGRATION_WORKER_BASE_URL: ${{ vars.INTEGRATION_WORKER_BASE_URL }}
          CLOUDFLARE_WORKERS_DEV_SUBDOMAIN: ${{ vars.CLOUDFLARE_WORKERS_DEV_SUBDOMAIN }}
        run: node packages/router-worker/scripts/resolve-deploy-settings.mjs >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'
      - uses: actions/setup-go@v6.5.0
        with:
          go-version: '1.26.4'

      - name: Wait for production gates
        if: github.event_name == 'workflow_run'
        env:
          GH_TOKEN: ${{ github.token }}
          GATE_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          for workflow in Security Fuzz; do
            ok=""
            for attempt in $(seq 1 30); do
              rows=$(gh run list --repo "$GITHUB_REPOSITORY" --workflow "$workflow" --commit "$GATE_SHA" --limit 20 --json status,conclusion,databaseId,url,name,workflowName,event,headBranch,headSha,createdAt)
              status=$(WORKFLOW_NAME="$workflow" GATE_SHA="$GATE_SHA" REQUIRED_EVENT=push REQUIRED_BRANCH=main node packages/router-worker/scripts/deploy-gate.mjs <<< "$rows")
              case "$status" in
                success*) ok="yes"; break ;;
                failure*) echo "::error::$workflow failed for $GATE_SHA: $status"; exit 1 ;;
              esac
              sleep 20
            done
            if [ "$ok" != "yes" ]; then echo "::error::$workflow did not complete successfully for $GATE_SHA"; exit 1; fi
          done

      - name: Validate deploy secrets
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_DEPLOY }}
          CLOUDFLARE_API_TOKEN_RUNTIME: ${{ secrets.CLOUDFLARE_API_TOKEN_RUNTIME }}
          MESH_STATE_KEY: ${{ secrets.MESH_STATE_KEY }}
        run: |
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_API_TOKEN_RUNTIME"
          test -n "$MESH_STATE_KEY"

      - name: Install router dependencies
        run: npm install

      - name: Repeat critical checks
        run: |
          npm run lint --workspace packages/router-worker
          npm run test --workspace packages/router-worker
          npm run typecheck --workspace packages/router-worker
          cd packages/node-agent
          go test ./...
          go vet ./...

      - name: Resolve or create D1 database
        working-directory: packages/router-worker
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_DEPLOY }}
          AGENT_RELEASE_TAG: ${{ steps.settings.outputs.version_tag }}
          WORKER_BASE_URL: ${{ steps.settings.outputs.worker_base_url }}
        run: |
          set -euo pipefail
          DB_NAME="${{ steps.settings.outputs.db_name }}"
          npm exec -- wrangler d1 list --json > d1-list.json
          DB_ID=$(DB_NAME="$DB_NAME" node -e "const fs=require('fs'); const rows=JSON.parse(fs.readFileSync('d1-list.json','utf8')); const row=rows.find((x)=>x.name===process.env.DB_NAME); if(row) process.stdout.write(row.uuid || row.id || '')")
          if [ -z "$DB_ID" ]; then
            npm exec -- wrangler d1 create "$DB_NAME" > d1-create.txt
            DB_ID=$(node scripts/d1-database-id.mjs d1-create.txt)
          fi
          [ -n "$DB_ID" ] || { echo "::error::Could not resolve D1 database id"; exit 1; }
          DB_ID="$DB_ID" node -e "const fs=require('fs'); const p='wrangler.toml'; let text=fs.readFileSync(p,'utf8').replaceAll('create-via-deploy-workflow', process.env.DB_ID).replaceAll('agent-release-tag-placeholder', process.env.AGENT_RELEASE_TAG); if (process.env.WORKER_BASE_URL) text=text.replaceAll('https://codeflare-inference-mesh-router.<your-subdomain>.workers.dev', process.env.WORKER_BASE_URL).replaceAll('https://codeflare-inference-mesh-router-integration.<your-subdomain>.workers.dev', process.env.WORKER_BASE_URL); fs.writeFileSync(p,text)"

      - name: Apply D1 migrations
        working-directory: packages/router-worker
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_DEPLOY }}
        run: |
          set -euo pipefail
          args=()
          if [ -n "${{ steps.settings.outputs.wrangler_env }}" ]; then args+=(--env "${{ steps.settings.outputs.wrangler_env }}"); fi
          npm exec -- wrangler d1 migrations apply "${{ steps.settings.outputs.db_name }}" --remote "${args[@]}"

      - name: Enable Workers VPC Mesh binding
        working-directory: packages/router-worker
        run: |
          sed -i \
            -e '/^# \[\[vpc_networks\]\]$/s/^# //' \
            -e '/^# \[\[env\.integration\.vpc_networks\]\]$/s/^# //' \
            -e '/^# binding = "MESH"$/s/^# //' \
            -e '/^# network_id = "cf1:network"$/s/^# //' \
            -e '/^# remote = true$/s/^# //' \
            wrangler.toml
          grep -q 'binding = "MESH"' wrangler.toml || { echo "::error::Workers VPC Mesh binding was not enabled"; exit 1; }
          grep -q 'network_id = "cf1:network"' wrangler.toml || { echo "::error::Workers VPC Mesh network was not enabled"; exit 1; }
          grep -q 'remote = true' wrangler.toml || { echo "::error::Workers VPC Mesh remote flag was not enabled"; exit 1; }

      - name: Set Worker runtime secrets
        working-directory: packages/router-worker
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_DEPLOY }}
          CLOUDFLARE_API_TOKEN_RUNTIME: ${{ secrets.CLOUDFLARE_API_TOKEN_RUNTIME }}
          ADMIN_RECOVERY_TOKEN: ${{ secrets.ADMIN_RECOVERY_TOKEN }}
        run: |
          set -euo pipefail
          args=()
          if [ -n "${{ steps.settings.outputs.wrangler_env }}" ]; then args+=(--env "${{ steps.settings.outputs.wrangler_env }}"); fi
          secrets_json="$(node <<'NODE'
          const payload = {
            CLOUDFLARE_ACCOUNT_ID: process.env.CLOUDFLARE_ACCOUNT_ID,
            CLOUDFLARE_API_TOKEN_RUNTIME: process.env.CLOUDFLARE_API_TOKEN_RUNTIME
          }
          if (process.env.ADMIN_RECOVERY_TOKEN) payload.ADMIN_RECOVERY_TOKEN = process.env.ADMIN_RECOVERY_TOKEN
          process.stdout.write(JSON.stringify(payload))
          NODE
          )"
          printf '%s' "$secrets_json" | npm exec -- wrangler secret bulk "${args[@]}"
          unset secrets_json
          if [ -z "$ADMIN_RECOVERY_TOKEN" ]; then
            if ! delete_output="$(printf 'y\n' | npm exec -- wrangler secret delete ADMIN_RECOVERY_TOKEN "${args[@]}" 2>&1)"; then
              if ! printf '%s' "$delete_output" | grep -Eiq 'not found|does not exist|no secret'; then
                printf '%s\n' "$delete_output" >&2
                exit 1
              fi
            fi
          fi

      - name: Set Worker mesh state key
        working-directory: packages/router-worker
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_DEPLOY }}
          MESH_STATE_KEY: ${{ secrets.MESH_STATE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "$MESH_STATE_KEY" ]; then
            echo "::error::MESH_STATE_KEY secret is not configured; refusing to deploy without the mesh state encryption key"
            exit 1
          fi
          args=()
          if [ -n "${{ steps.settings.outputs.wrangler_env }}" ]; then args+=(--env "${{ steps.settings.outputs.wrangler_env }}"); fi
          printf '%s' "$MESH_STATE_KEY" | npm exec -- wrangler secret put MESH_STATE_KEY "${args[@]}"

      - name: Build release artifacts and manifest
        working-directory: packages/node-agent
        run: |
          set -euo pipefail
          mkdir -p dist
          for target in linux/amd64 linux/arm64 windows/amd64 darwin/arm64; do
            GOOS=${target%/*}
            GOARCH=${target#*/}
            EXT=""
            [ "$GOOS" = "windows" ] && EXT=".exe"
            OUT="dist/inference-mesh-agent-${GOOS}-${GOARCH}${EXT}"
            GOOS=$GOOS GOARCH=$GOARCH go build -ldflags "-X main.version=${{ steps.settings.outputs.version_tag }}" -o "$OUT" ./cmd/inference-mesh-agent
            if [ "$GOOS" = "windows" ]; then
              (cd dist && zip "inference-mesh-agent-${GOOS}-${GOARCH}.zip" "inference-mesh-agent-${GOOS}-${GOARCH}${EXT}")
            else
              tar -C dist -czf "dist/inference-mesh-agent-${GOOS}-${GOARCH}.tar.gz" "inference-mesh-agent-${GOOS}-${GOARCH}"
            fi
            rm -f "$OUT"
          done
          cd dist
          sha256sum *.tar.gz *.zip > checksums.txt
          sha256sum -c checksums.txt
          node -e "const fs=require('fs'); const crypto=require('crypto'); const files=fs.readdirSync('.').filter((f)=>/\.(tar\.gz|zip)$/.test(f)); const artifacts=files.map((name)=>({name, sha256: crypto.createHash('sha256').update(fs.readFileSync(name)).digest('hex')})); fs.writeFileSync('release-manifest.json', JSON.stringify({version:'${{ steps.settings.outputs.version_tag }}', channel:'${{ steps.settings.outputs.target_env }}', commit:process.env.GITHUB_SHA, publishedAt:new Date().toISOString(), artifacts}, null, 2)); fs.writeFileSync('release-notes.md', '# Inference Mesh Agent ${{ steps.settings.outputs.version_tag }}\n\nSee release-manifest.json and checksums.txt for artifact metadata.\n')"

      - name: Sign checksums when signing is configured
        working-directory: packages/node-agent/dist
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "$COSIGN_PRIVATE_KEY" ]; then
            echo "Cosign key not configured; skipping signature"
            exit 0
          fi
          go install github.com/sigstore/cosign/v2/cmd/cosign@v2.6.1
          cosign sign-blob --key env://COSIGN_PRIVATE_KEY --output-signature checksums.txt.sig checksums.txt

      - name: Publish GitHub Release
        working-directory: packages/node-agent/dist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PRERELEASE=""
          if [ "${{ steps.settings.outputs.target_env }}" = "integration" ]; then PRERELEASE="--prerelease"; fi
          gh release create "${{ steps.settings.outputs.version_tag }}" * --target "$GITHUB_SHA" --title "${{ steps.settings.outputs.version_tag }}" --notes-file release-notes.md $PRERELEASE

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: inference-mesh-release-artifacts
          path: packages/node-agent/dist/*

      - name: Deploy Worker
        working-directory: packages/router-worker
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_DEPLOY }}
        run: |
          set -euo pipefail
          args=()
          if [ -n "${{ steps.settings.outputs.wrangler_env }}" ]; then args+=(--env "${{ steps.settings.outputs.wrangler_env }}"); fi
          npm exec -- wrangler deploy "${args[@]}"

      - name: Write deployment summary
        run: |
          {
            echo "## Codeflare Inference Mesh Deploy"
            echo "- Environment: ${{ steps.settings.outputs.target_env }}"
            echo "- Ref: ${{ steps.settings.outputs.deploy_ref }}"
            echo "- Worker: ${{ steps.settings.outputs.worker_name }}"
            echo "- Release tag: ${{ steps.settings.outputs.version_tag }}"
            echo "- Artifacts: inference-mesh-release-artifacts"
          } >> "$GITHUB_STEP_SUMMARY"
