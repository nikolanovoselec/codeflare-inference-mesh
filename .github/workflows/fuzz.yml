name: Fuzz
# REL004FuzzWorkflows

on:
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
  schedule:
    - cron: '43 4 * * 1'

permissions:
  contents: read

jobs:
  router-fuzz:
    name: Router bounded fuzz
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'
      - name: Install dependencies
        run: npm install
      - name: Run router fuzz corpus
        run: npx vitest run src/fuzz.test.ts
        working-directory: packages/router-worker

  agent-fuzz:
    name: Agent bounded fuzz
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    defaults:
      run:
        working-directory: packages/node-agent
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-go@v6.5.0
        with:
          go-version: '1.26.4'
      - name: Run agent fuzz targets
        run: go test -run=^$ -fuzz=Fuzz -fuzztime=30s ./internal/agent
